<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | XCT - お問い合わせ</title>
    <meta name="description" content="導入のご相談、審査への応募はこちらから受け付けております。">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://xct-lp.vercel.app/contact.html">
    <meta property="og:title" content="Contact | XCT">
    <meta property="og:description" content="導入のご相談、審査への応募はこちらから受け付けております。">
    <meta property="og:image" content="https://xct-lp.vercel.app/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-off-white text-gray-900 min-h-screen">
    <!-- Sticky Header -->
    <header class="sticky-nav bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <a href="index.html"
                class="text-3xl font-bold tracking-tighter text-navy hover:text-gold transition-colors duration-300">
                XCT<span class="text-gold">.</span>
            </a>
            <a href="index.html"
                class="text-xs font-bold text-gray-400 hover:text-navy transition-all duration-300">BACK TO HOME</a>
        </div>
    </header>

    <main class="py-24 px-6 pt-32">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-16 reveal">
                <h1 class="text-fluid-h1 text-navy font-bold mb-6">Contact</h1>
                <p class="text-gray-500">導入のご相談、審査への応募はこちらからお願いいたします。</p>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-16 border border-blue-50 reveal delay-100">
                <form id="contactForm" class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <label for="org"
                                class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">企業名・学校名</label>
                            <input type="text" id="org" name="org" required
                                class="w-full px-6 py-4 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-gold focus:ring-4 focus:ring-gold/5 outline-none transition-all duration-300"
                                placeholder="株式会社XCT / ○○大学">
                        </div>
                        <div>
                            <label for="name"
                                class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">代表者・担当者名</label>
                            <input type="text" id="name" name="name" required
                                class="w-full px-6 py-4 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-gold focus:ring-4 focus:ring-gold/5 outline-none transition-all duration-300"
                                placeholder="山田 太郎">
                        </div>
                    </div>

                    <div>
                        <label for="email"
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">メールアドレス</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-6 py-4 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-gold focus:ring-4 focus:ring-gold/5 outline-none transition-all duration-300"
                            placeholder="example@xct.jp">
                    </div>

                    <div>
                        <label for="plan"
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">希望プラン /
                            お問い合わせ種別</label>
                        <select id="plan" name="plan" required
                            class="w-full px-6 py-4 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-gold focus:ring-4 focus:ring-gold/5 outline-none transition-all duration-300 appearance-none bg-white">
                            <option value="">選択してください</option>
                            <option value="success">成果報酬プラン (¥3,000/月)</option>
                            <option value="fixed">固定ミニマムプラン (¥5,000/月)</option>
                            <option value="scout">スカウト完全代行プラン (¥30,000/月)</option>
                            <option value="student">精鋭学生としての審査応募</option>
                            <option value="other">その他のお問い合わせ</option>
                        </select>
                    </div>

                    <div>
                        <label for="message"
                            class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">メッセージ内容</label>
                        <textarea id="message" name="message" rows="6"
                            class="w-full px-6 py-4 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:border-gold focus:ring-4 focus:ring-gold/5 outline-none transition-all duration-300"
                            placeholder="ご質問や、現在の課題などをご記入ください。"></textarea>
                    </div>

                    <div class="pt-6">
                        <button type="submit" id="submitBtn"
                            class="btn-gold w-full py-5 text-xl rounded-xl shadow-xl shadow-gold/10">
                            <span>送信内容を確認して送る</span>
                            <svg class="w-6 h-6 ml-3 transform group-hover:translate-x-1 transition-transform"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </button>
                    </div>
                </form>

                <!-- Success Message -->
                <div id="successMessage" class="hidden text-center py-20">
                    <div
                        class="w-24 h-24 bg-gold/10 text-gold rounded-full flex items-center justify-center mx-auto mb-10">
                        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-3xl font-bold text-navy mb-6">送信完了しました。</h2>
                    <p class="text-gray-500 mb-10 text-lg leading-relaxed">
                        お問い合わせありがとうございます。XCT運営事務局より、<br>
                        3営業日以内にご連絡させていただきます。
                    </p>
                    <a href="index.html" class="text-gold font-bold hover:underline">トップページへ戻る</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-gray-100 text-center text-sm text-gray-500">
        <p>&copy; 2026 Cross Consulting Team. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
